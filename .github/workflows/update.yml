name: Update Filtered Index

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to run it manually whenever you want

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the script to save the changes back to your repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Filter Script
        run: python filter.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.min.json
          
          # Only commit if changes actually exist
          if ! git diff --cached --quiet; then
            git commit -m "Automated Sync: Filtered updates applied"
            git push
          else
            echo "No changes found. Skipping push."
          fi
